<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sisiwenyewe | CBRN Intelligence Chatbot</title>
    <link rel="stylesheet" href="style.css?v=4">
</head>
<body>
    <div class="app-shell">
        <aside class="sidebar">
            <div class="sidebar-top">
                <div class="brand-block">
                    <h1 class="brand-name">Sisiwenyewe</h1>
                    <p class="brand-tag">Sovereign CBRN Intelligence</p>
                </div>

                <button id="new-chat-btn" class="new-chat-btn">+ New Chat</button>
            </div>

            <div class="history-section">
                <div class="history-header">
                    <span>Recent Chats</span>
                </div>
                <div id="chat-history" class="chat-history"></div>
            </div>
        </aside>

        <main class="main-panel">
            <div class="topbar">
                <div class="header">
                    <h2 class="main-title">Sisiwenyewe</h2>
                    <p class="sub-title">Ugandan CBRN Intelligence Model</p>
                    <div class="flag-wrap">
                        <img src="logo1.png" alt="Uganda Flag" class="flag-logo">
                        <span class="flag-shimmer"></span>
                    </div>
                </div>
            </div>

            <section id="chat-box" class="chat-box">
                <div class="welcome-card">
                    <div class="welcome-icon">🧠</div>
            
                    <p class="welcome-text">
                        Ask questions about CBRN threats, or analyze live sensor data and intelligence.
                    </p>
            
                    <div class="prompt-chip-wrap">
                        <!-- Knowledge prompts -->
                        <button class="prompt-chip" onclick="fillPrompt('What is anthrax?')">
                            What is anthrax?
                        </button>
            
                        <button class="prompt-chip" onclick="fillPrompt('Summarise biological agents')">
                            Summarise biological agents
                        </button>
            
                        <!-- Live sensor data -->
                        <button class="prompt-chip" onclick="fillPrompt('Show me the latest sensor data and current readings')">
                            Live Sensor Data
                        </button>
            
                        <button class="prompt-chip" onclick="fillPrompt('Give me a detailed analysis of the current sensor readings including risk level, trend, and anomaly detection')">
                            AI Sensor Analysis
                        </button>
            
                        <!-- Intelligence layer -->
                        <button class="prompt-chip" onclick="fillPrompt('Generate a threat briefing based on the latest sensor data')">
                            Threat Briefing
                        </button>
                    </div>
                </div>
            </section>

            <div id="status-bar" class="status-bar hidden">
                <div class="thinking-wrap">
                    <div class="brain-loader">
                        <div class="brain-core">🧠</div>
                        <div class="brain-ring ring-1"></div>
                        <div class="brain-ring ring-2"></div>
                    </div>
                    <div class="thinking-text">
                        Searching the CBRN knowledge base...
                    </div>
                </div>
            </div>

            <div class="input-panel">
                <input
                    type="text"
                    id="question"
                    placeholder="Ask a CBRN question..."
                    autocomplete="off"
                />
                <button id="ask-btn" class="ask-btn">Ask</button>
                <button id="speak-btn" class="speak-btn" type="button">🎤 Speak</button>
            </div>


            <footer class="app-footer">
                <span>© 2026 Sisiwenyewe Uganda</span>
                <a href="https://sisiwenyewe.com" target="_blank">
                    https://sisiwenyewe.com
                </a>
            </footer>

        </main>
    </div>

    <script src="app.js?v=4"></script>
</body>
</html>
